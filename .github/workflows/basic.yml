# Description:
#   - Setup Moonbit with GitHub Actions
# REF:
#   - https://github.com/marketplace/actions/checkout
#   - https://github.com/chawyehsu/moonbit-binaries/releases

name: Setup-Moonbit@Dev Basic
on:
  workflow_dispatch:
  push:
    branches:
      - develop

    paths-ignore:
      - '**.md'

jobs:
  setup-moonbit:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    name: Setup MoonBit@${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Moonbit
        uses: hustcer/setup-moonbit@develop

      - name: Check Moonbit Version
        run: |
          moon version --all

  setup-moonbit-of-version:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    name: Setup MoonBit with Version@${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Moonbit with Version
        uses: hustcer/setup-moonbit@develop
        with:
          setup-core: false
          version: 0.9.0+9a9aff28a

      - name: Check Moonbit Version
        run: |
          moon version --all

  setup-moonbit-nightly:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
    runs-on: ${{ matrix.os }}
    name: Setup MoonBit Nightly@${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Moonbit Nightly
        uses: hustcer/setup-moonbit@develop
        with:
          version: nightly
          core-version: nightly

      - name: Check Moonbit Version
        run: |
          moon version --all

  # Regression test for #107: ${{ github.action_path }} expands to a host-side
  # path that doesn't exist inside container jobs, so the action must resolve
  # its files via $env.GITHUB_ACTION_PATH at runtime.
  setup-moonbit-in-container:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04
    name: Setup MoonBit in Container
    steps:
      # The bare ubuntu image has no CA certificates, so rustls-backed HTTPS
      # in nu's `http get` fails. Install them before fetching anything.
      - name: Install CA certificates
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Moonbit
        uses: hustcer/setup-moonbit@main

      - name: Check Moonbit Version
        run: |
          moon version --all
